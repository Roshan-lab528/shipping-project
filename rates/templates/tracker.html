<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Run Tracker</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body { background: #f4f6f9; }

.card {
    border-radius: 14px;
    box-shadow: 0 6px 18px rgba(0,0,0,0.08);
}

.form-section {
    padding: 12px;
    background: #ffffff;
    border-radius: 10px;
    border: 1px solid #eaeaea;
}

.shipping-btn {
    text-align: left;
}

.removeRow {
    height: 36px;
}
</style>
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand fw-bold" href="/">🚢 SHIPPING PANEL</a>

        <div class="d-flex gap-2">
            <!-- ✅ ONLY THESE OPEN IN NEW TAB -->
            <a href="/" target="_blank" class="btn btn-success btn-sm">🏠 Home</a>
            <a href="/scraper/" target="_blank" class="btn btn-warning btn-sm">🚀 Scraper</a>
        </div>
    </div>
</nav>

<div class="container mt-4">
<div class="card p-3">

<!-- ❌ FORM SAME TAB (NO target blank) -->
<form id="trackerForm" method="POST" action="{% url 'run_tracker' %}">
{% csrf_token %}

<div class="d-flex justify-content-between mb-2">
    <h6 class="mb-0">Tracker</h6>
    <button type="button" id="addRow" class="btn btn-success btn-sm">
        ➕ Add Row
    </button>
</div>

<div id="rows">

<div class="row g-2 align-items-end form-section mb-2">

<div class="col-lg-4 col-md-5">
    <div class="dropdown">
        <button type="button" class="btn btn-outline-primary w-100 dropdown-toggle shipping-btn"
                data-bs-toggle="dropdown">
            Select Tracker
        </button>

        <ul class="dropdown-menu w-100 p-2 shipping-menu">
            <li><span class="dropdown-item text-muted">Loading...</span></li>
        </ul>
    </div>
</div>

<div class="col-lg-3 col-md-4 col-sm-6">
    <button type="button" class="btn btn-outline-danger w-100 removeRow d-none">
        ❌ Remove
    </button>
</div>

</div>
</div>

<button type="submit" id="runBtn" class="btn btn-success w-100 mt-2">
    ▶ Run Tracker
</button>

</form>
</div>
</div>

<script>

// LOAD SHIPPING LINES
function loadShippingLines(row){

    fetch("/get-shipping-lines/")
    .then(res => res.json())
    .then(data => {

        let menu = row.querySelector(".shipping-menu");
        menu.innerHTML = "";

        menu.innerHTML += `
        <li>
            <label class="dropdown-item fw-bold">
                <input type="checkbox" class="select-all"> Select All
            </label>
        </li>
        <li><hr class="dropdown-divider"></li>
        `;

        data.shipping_lines.forEach(line => {
            menu.innerHTML += `
            <li>
                <label class="dropdown-item">
                    <input type="checkbox" class="shipping-line" name="shipping_line[]" value="${line}">
                    ${line}
                </label>
            </li>`;
        });

    });
}

// INIT
document.querySelectorAll(".form-section").forEach(loadShippingLines);

// CHECKBOX LOGIC
document.addEventListener("change", function(e){

let row = e.target.closest(".form-section");
if(!row) return;

if(e.target.classList.contains("select-all")){
    let checked = e.target.checked;
    row.querySelectorAll(".shipping-line").forEach(cb=>{
        cb.checked = checked;
    });
}

let selected = [...row.querySelectorAll(".shipping-line:checked")].map(cb=>cb.value);
let btn = row.querySelector(".shipping-btn");

if(selected.length === 0){
    btn.innerText = "Select Tracker";
}
else if(selected.length === row.querySelectorAll(".shipping-line").length){
    btn.innerText = "All Selected";
}
else{
    btn.innerText = selected.slice(0,2).join(", ") + (selected.length>2 ? "..." : "");
}

});

// ADD ROW
document.getElementById("addRow").addEventListener("click", function(){

    let container = document.getElementById("rows");
    let firstRow = container.querySelector(".form-section");
    let newRow = firstRow.cloneNode(true);

    newRow.querySelector(".shipping-btn").innerText = "Select Tracker";
    newRow.querySelector(".shipping-menu").innerHTML = "<li>Loading...</li>";

    container.appendChild(newRow);

    loadShippingLines(newRow);
    updateRemove();
});

// REMOVE ROW
document.addEventListener("click", function(e){
if(e.target.classList.contains("removeRow")){
    e.target.closest(".form-section").remove();
    updateRemove();
}
});

// SHOW REMOVE BUTTON
function updateRemove(){
    let rows = document.querySelectorAll(".form-section");

    rows.forEach(r=>{
        let btn = r.querySelector(".removeRow");
        btn.classList.toggle("d-none", rows.length === 1);
    });
}

updateRemove();

// BUTTON LOADING
document.getElementById("trackerForm").addEventListener("submit", function(){
    let btn = document.getElementById("runBtn");
    btn.innerHTML = "⏳ Running...";
    btn.disabled = true;
});

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
